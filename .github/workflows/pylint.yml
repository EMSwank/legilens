name: Pylint

on:
  pull_request:
    branches:
    - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install fastapi "sqlalchemy[asyncio]" asyncpg alembic pydantic pydantic-settings datasketch redis httpx apscheduler slowapi pypdf==6.12.2
    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py')
